name = "minnotes-worker"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# GROQ_API_KEY is set as a Cloudflare secret (NOT in [vars]) so it never
# lands in git. Set it once via:
#   npx wrangler secret put GROQ_API_KEY
# Then paste the key. The worker reads it from env.GROQ_API_KEY at runtime.

[[kv_namespaces]]
binding = "WAITLIST"
id = "4dd6467700cd41c7b284ab9dc72bbbb6"

# Rate-limit counters. Keys: `rl:{ip}:{YYYY-MM-DD}` → count.
# TTL: 48 hours (auto-cleanup of stale day buckets).
[[kv_namespaces]]
binding = "RATELIMIT"
id = "b2ced54310ca4f0cb52f02ab2a54e808"
